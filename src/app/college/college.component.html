<style>
/* Background */
.college-bg {
  background-image: url('/assets/login2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  padding-top: 80px;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-bottom: 30px;
}

/* Card */
.college-card {
  width: 100%;
  max-width: 650px;
  border-radius: 10px;
  background: linear-gradient(to bottom right, white, #e9ecef);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  padding: 35px;
  margin: 10px;
}

/* Icons */
.input-group-text {
  background: #ebebe0;
  min-width: 45px;
  justify-content: center;
}
</style>

<br><br><br><br>

<div class="container-fluid college-bg">
  <div class="card college-card shadow-lg">

    <!-- Title -->
    <h2 class="text-center text-dark mb-3">
      <span *ngIf="!form.data.id">
        {{'CollegeForm.AddCollege' | translate}}
      </span>
      <span *ngIf="form.data.id">
        {{'CollegeForm.UpdateCollege' | translate}}
      </span>
    </h2>

    <!-- Messages -->
    <div class="text-center mb-3">
      <span class="alert alert-success p-1" *ngIf="!form.error && form.message">
        {{ form.message }}
      </span>
      <span class="alert alert-danger p-1" *ngIf="form.error && form.message">
        {{ form.message }}
      </span>
    </div>

    <form>

      <!-- Name -->
      <label class="fw-bold">
        {{'CollegeForm.Name' | translate}} <span class="text-danger">*</span>
      </label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-university"></i></span>
        <input type="text" class="form-control"
          name="name"
          [(ngModel)]="form.data.name"
          [placeholder]="'CollegeForm.CollegePlaceholders.Name' | translate">
      </div>
      <small class="text-danger">{{form.inputerror.name}}</small>

      <!-- Address -->
      <label class="fw-bold mt-3">
        {{'CollegeForm.Address' | translate}} <span class="text-danger">*</span>
      </label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-map-marker-alt"></i></span>
        <input type="text" class="form-control"
          name="address"
          [(ngModel)]="form.data.address"
          [placeholder]="'CollegeForm.CollegePlaceholders.Address' | translate">
      </div>
      <small class="text-danger">{{form.inputerror.address}}</small>

      <!-- State -->
      <label class="fw-bold mt-3">
        {{'CollegeForm.State' | translate}} <span class="text-danger">*</span>
      </label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-flag"></i></span>
        <input type="text" class="form-control"
          name="state"
          [(ngModel)]="form.data.state"
          [placeholder]="'CollegeForm.CollegePlaceholders.State' | translate">
      </div>
      <small class="text-danger">{{form.inputerror.state}}</small>

      <!-- City -->
      <label class="fw-bold mt-3">
        {{'CollegeForm.City' | translate}} <span class="text-danger">*</span>
      </label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-city"></i></span>
        <input type="text" class="form-control"
          name="city"
          [(ngModel)]="form.data.city"
          [placeholder]="'CollegeForm.CollegePlaceholders.City' | translate">
      </div>
      <small class="text-danger">{{form.inputerror.city}}</small>

      <!-- Phone -->
      <label class="fw-bold mt-3">
        {{'CollegeForm.Phone No' | translate}} <span class="text-danger">*</span>
      </label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-phone"></i></span>
        <input type="text" class="form-control"
          name="phoneNo"
          [(ngModel)]="form.data.phoneNo"
          maxlength="10"
          [placeholder]="'CollegeForm.CollegePlaceholders.Phone No' | translate">
      </div>
      <small class="text-danger">{{form.inputerror.phoneNo}}</small>

      <!-- Buttons -->
      <div class="text-center mt-4">
        <button type="button" class="btn btn-success" (click)="submit()">
          {{'CollegeForm.Buttons.Save' | translate}}
        </button>
        &nbsp;&nbsp;&nbsp;
        <button type="button" class="btn btn-warning" (click)="reset()">
          {{'CollegeForm.Buttons.Reset' | translate}}
        </button>
      </div>

    </form>

  </div>
</div>

<br><br><br><br>
