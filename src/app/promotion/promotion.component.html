<div align="center">

    <h1 *ngIf="!form.data.id" style="margin-bottom: 5px; color: navy">
        Add Promotion
    </h1>
    <h1 *ngIf="form.data.id>0" style="margin-bottom: 5px; color: navy">
        Update Promotion
    </h1>

    <div style="height: 20px; margin-bottom: 10px;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">
            {{ form.message }}
        </h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">
            {{ form.message }}
        </h3>
    </div>

    <table>

        <tr>
            <th align="left">Promotion Code<span style="color:red">*</span></th>
            <td>
                <input type="text" name="promotionCode" [(ngModel)]="form.data.promotionCode"
                    placeholder="Enter Promotion Code">
            </td>
            <td style="position: fixed; color: red;">
                {{form.inputerror.promotionCode}}
            </td>
        </tr>



        <tr>
            <th align="left">Promotion Title<span style="color:red">*</span></th>
            <td>
                <input type="text" name="promotionTitle" [(ngModel)]="form.data.promotionTitle" placeholder="Enter Promotion Title">
            </td>
            <td style="position: fixed; color: red;">
                {{form.inputerror.promotionTitle}}
            </td>
        </tr>

        <tr>
            <th align="left">Date<span style="color: red">*</span></th>
            <td><input type="date" name="startDate" [(ngModel)]="form.data.startDate" [ngModel]="form.data.startDate | date:'yyyy-MM-dd'" placeholder="Select Date " style="width: 97%;"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.startDate}}</td>
        </tr>

        <tr>
            <th align="left">Promotion Status<span style="color:red">*</span></th>
            <td>
                <select name="promotionStatus" [(ngModel)]="form.data.promotionStatus" style="width:170px;">
                    <option value="undefined">------------Select------------</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>

                </select>
            </td>
            <td style="position: fixed; color: red;">
                {{form.inputerror.promotionStatus}}
            </td>
        </tr>

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                <button (click)="reset()">reset</button>
            </td>
        </tr>

    </table>
</div>
