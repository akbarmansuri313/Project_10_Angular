<style>
.change-bg {
  background-image: url('/assets/login2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
}

.change-card {
  width: 600px;
  border-radius: 10px;
  background: linear-gradient(to bottom right, white, grey);
  box-shadow: 9px 8px 7px #001a33;
  padding: 30px;
}

.input-group-text {
  background: #ebebe0;
}
</style>

<div class="container-fluid d-flex justify-content-center align-items-center change-bg">

  <div class="card change-card">

    <h3 class="text-center text-dark mb-3"><b>Change Password</b></h3>

    <!-- Success / Error Message -->
    <div class="text-center mb-2">
      <span class="alert alert-success py-1" *ngIf="!form.error && form.message">
        {{ form.message }}
      </span>
      <span class="alert alert-danger py-1" *ngIf="form.error && form.message">
        {{ form.message }}
      </span>
    </div>

    <!-- Old Password -->
    <label class="fw-bold">Old Password <span class="text-danger">*</span></label>
    <div class="input-group mb-2">
      <span class="input-group-text"><i class="fa fa-lock"></i></span>
      <input type="password" class="form-control" name="oldPassword" [(ngModel)]="form.data.oldPassword"
        placeholder="Enter Old Password">
    </div>
    <small class="text-danger">{{ form.inputerror.oldPassword }}</small>

    <!-- New Password -->
    <label class="fw-bold mt-3">New Password <span class="text-danger">*</span></label>
    <div class="input-group mb-2">
      <span class="input-group-text"><i class="fa fa-lock"></i></span>
      <input type="password" class="form-control" name="newPassword" [(ngModel)]="form.data.newPassword"
        placeholder="Enter New Password">
    </div>
    <small class="text-danger">{{ form.inputerror.newPassword }}</small>

    <!-- Button Centered -->
    <div class="text-center mt-4">
      <button class="btn btn-success px-5" (click)="changePassword()">Change Password</button>
    </div>

  </div>

</div>
