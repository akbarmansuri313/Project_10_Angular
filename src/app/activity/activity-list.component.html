<div align="center">
    <h1 align="center" style="margin-bottom: 5px; color: navy;">
        Activity List
    </h1>

 
    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">
            {{ form.message }}
        </h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">
            {{ form.message }}
        </h3>
    </div>

    <div *ngIf="form.list.length > 0">

      
        <table style="width: 100%">
            <tr>
                <td align="center">
                    <label><b>Activity Name: </b></label>
                    <input type="text"
                           name="activityName"
                           [(ngModel)]="form.searchParams.activityName"
                           placeholder="Enter Activity Name">
                    &nbsp;

                    <button (click)="search()">search</button>&nbsp;
                    <button (click)="reset()">reset</button>
                </td>
            </tr>
        </table>

        <br>

        <!-- List Table -->
        <table border="1" style="width: 100%; border: groove;">
            <tr style="background-color: #e1e6f1e3;">
                <th>
                    <input type="checkbox"
                           [(ngModel)]="isMasterSel"
                           (change)="checkUncheckAll($event)" />
                </th>
                <th>S.No</th>
                <th>Activity Id</th>
                <th>Activity Name</th>
                <th>Performed By</th>
                <th>Activity Date</th>
                <th>Status</th>
                <th>Edit</th>
            </tr>

            <tr align="center" *ngFor="let a of form.list; let i = index">
                <td>
                    <input type="checkbox"
                           #checkboxes
                           (change)="checklistUpdate()"
                           [id]="a.activityId"
                           [value]="isMasterSel">
                </td>

                <td>{{ (form.pageNo * 5) + i + 1 }}</td>
                <td>{{ a.activityId }}</td>
                <td>{{ a.activityName }}</td>
                <td>{{ a.performedBy }}</td>
                <td>{{ a.activityTime | date:'yyyy-MM-dd' }}</td>
                <td>{{ a.activityStatus }}</td>

                <td>
                    <a (click)="forward('/activity/' + a.id)"
                       style="cursor: pointer; color: blue;">
                        Edit
                    </a>
                </td>
            </tr>
        </table>

        <br>

      
        <table style="width: 100%">
            <tr>
                <td style="width: 25%">
                    <button (click)="previous()"
                            [disabled]="form.pageNo == 0">
                        previous
                    </button>
                </td>

                <td align="center" style="width: 25%">
                    <button (click)="forward('/activity')">
                        new
                    </button>
                </td>

                <td align="center" style="width: 25%">
                    <button (click)="deleteMany()">
                        delete
                    </button>
                </td>

                <td style="width: 25%" align="right">
                    <button (click)="next()"
                            [disabled]="form.nextListSize == 0">
                        next
                    </button>
                </td>
            </tr>
        </table>
    </div>

    <br>

    <div *ngIf="form.list.length == 0">
        <button (click)="reset()">Back</button>
    </div>
</div>
