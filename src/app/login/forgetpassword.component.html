<style>
.forget-bg {
  background-image: url('/assets/login2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
}

.forget-card {
  width: 550px;
  border-radius: 10px;
  background: linear-gradient(to bottom right, white, grey);
  box-shadow: 9px 8px 7px #001a33;
  padding: 30px;
}

.input-group-text {
  background: #ebebe0;
}
</style>



<br>
<br>
<div class="container-fluid d-flex justify-content-center align-items-center forget-bg">

  <div class="card forget-card">

    <h3 class="text-center text-dark mb-3"><b>Forget Password</b></h3>

    <!-- Success / Error Message -->
    <div class="text-center mb-2">
      <span class="alert alert-success p-1" *ngIf="!form.error && form.message">
        {{ form.message }}
      </span>
      <span class="alert alert-danger p-1" *ngIf="form.error && form.message">
        {{ form.message }}
      </span>
    </div>

    <!-- Login Id -->
    <label class="fw-bold">Login Id <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text">
        <i class="fa fa-user"></i>
      </span>
      <input
        type="text"
        class="form-control"
        name="loginId"
        [(ngModel)]="form.data.loginId"
        placeholder="Enter Login ID">
    </div>
    <small class="text-danger">{{ form.inputerror.loginId }}</small>

    <!-- Buttons -->
    <div class="text-center mt-4">
      <button class="btn btn-success px-4" (click)="submit()">Go</button>
    </div>

    <!-- Back to Login -->
    <div class="text-center mt-4">
      <a routerLink="/login" class="text-dark">
        <b><u>Back to Login</u></b>
      </a>
    </div>

  </div>

</div>
<br>
<br>
