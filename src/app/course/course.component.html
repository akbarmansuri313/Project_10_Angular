<style>
/* Background */
.course-bg {
  background-image: url('/assets/login2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  padding-top: 80px;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-bottom: 30px;
}

/* Card */
.course-card {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
  background: linear-gradient(to bottom right, white, #e9ecef);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  padding: 35px;
  margin: 10px;
}

/* Icons */
.input-group-text {
  background: #ebebe0;
  min-width: 45px;
  justify-content: center;
}
</style>

<br><br><br><br>

<div class="container-fluid course-bg">
  <div class="card course-card shadow-lg">

    <!-- Title -->
    <h2 class="text-center text-dark mb-3">
      <span *ngIf="!form.data.id">Add Course</span>
      <span *ngIf="form.data.id">Update Course</span>
    </h2>

    <!-- Messages -->
    <div class="text-center mb-3">
      <span class="alert alert-success p-1" *ngIf="!form.error && form.message">{{ form.message }}</span>
      <span class="alert alert-danger p-1" *ngIf="form.error && form.message">{{ form.message }}</span>
    </div>

    <form>

      <!-- Name -->
      <label class="fw-bold">Course Name <span class="text-danger">*</span></label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-book"></i></span>
        <input type="text" class="form-control" name="name"
          [(ngModel)]="form.data.name"
          placeholder="Enter Course Name">
      </div>
      <small class="text-danger">{{form.inputerror.name}}</small>

      <!-- Duration -->
      <label class="fw-bold mt-3">Duration <span class="text-danger">*</span></label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-clock"></i></span>
        <select class="form-control" name="duration"
          [(ngModel)]="form.data.duration">
          <option value="undefined">------------Select------------</option>
          <option [value]="1">1 Year</option>
          <option [value]="2">2 Year</option>
          <option [value]="3">3 Year</option>
          <option [value]="4">4 Year</option>
          <option [value]="5">5 Year</option>
        </select>
      </div>
      <small class="text-danger">{{form.inputerror.duration}}</small>

      <!-- Description -->
      <label class="fw-bold mt-3">Description <span class="text-danger">*</span></label>
      <div class="input-group mb-2">
        <span class="input-group-text"><i class="fa fa-align-left"></i></span>
        <textarea class="form-control"
          name="description"
          [(ngModel)]="form.data.description"
          rows="3"
          placeholder="Enter Description">
        </textarea>
      </div>
      <small class="text-danger">{{form.inputerror.description}}</small>

      <!-- Buttons -->
      <div class="text-center mt-4">
        <button type="button" class="btn btn-success" (click)="submit()">Save</button>
        &nbsp;&nbsp;&nbsp;
        <button type="button" class="btn btn-warning" (click)="reset()">Reset</button>
      </div>

    </form>

  </div>
</div>

<br><br><br><br>
